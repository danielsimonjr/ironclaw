name: Release-plz

on:
  push:
    branches:
      - main

jobs:

  # Release unpublished packages.
  release-plz-release:
    if: ${{ github.repository_owner == 'danielsimonjr' }}
    name: Release-plz release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # needed by the dispatch step (gh workflow run release.yml)
      actions: write
    steps:
      - &checkout
        name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - &install-rust
        name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Generating a GitHub token, so that PRs and tags created by
      # the release-plz-action can trigger actions workflows.
      # The GH_RELEASES_MANAGER_* app secrets are OPTIONAL: when absent the
      # step is allowed to fail and we fall back to the built-in GITHUB_TOKEN.
      # Caveat of the fallback: tags created with GITHUB_TOKEN do not trigger
      # other workflows (e.g. the cargo-dist release.yml installer build).
      - name: Generate GitHub token
        uses: actions/create-github-app-token@v2
        id: generate-token
        continue-on-error: true
        with:
          # GitHub App ID secret name
          app-id: ${{ secrets.GH_RELEASES_MANAGER_APP_ID }}
          # GitHub App private key secret name
          private-key: ${{ secrets.GH_RELEASES_MANAGER_APP_PRIVATE_KEY }}
      - name: Run release-plz
        id: release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token || secrets.GITHUB_TOKEN }}
      # Tags created with the fallback GITHUB_TOKEN do not emit a push event
      # that other workflows can see, so explicitly dispatch the cargo-dist
      # release workflow at the new tag. workflow_dispatch is the documented
      # exception to GitHub's no-recursive-trigger rule for GITHUB_TOKEN.
      - name: Dispatch cargo-dist release for new tags
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token || secrets.GITHUB_TOKEN }}
        run: |
          echo '${{ steps.release.outputs.releases }}' | jq -r '.[].tag' | while read -r tag; do
            [ -n "$tag" ] && gh workflow run release.yml --repo "$GITHUB_REPOSITORY" --ref "$tag"
          done

  # Create a PR with the new versions and changelog, preparing the next release.
  release-plz-pr:
    if: ${{ github.repository_owner == 'danielsimonjr' }}
    name: Release-plz PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - *checkout
      - *install-rust
      - uses: Swatinem/rust-cache@v2
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
